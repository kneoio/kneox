<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dev</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mixpla.io/">
    <meta property="og:title" content="MIXPLA">
    <meta property="og:description" content="Build your radio station. Let AI DJ handle the flow.">
    <meta property="og:site_name" content="MIXPLA">
    <meta property="og:image" content="https://mixpla.io/maskable_icon_x512.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MIXPLA">
    <meta name="twitter:description" content="Build your radio station. Let AI DJ handle the flow.">
    <meta name="twitter:image" content="https://mixpla.io/maskable_icon_x512.png">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #040404;
            color: #f3f3f3;
        }
        #app-loader {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: radial-gradient(circle at top, rgba(90,90,255,0.15), transparent 60%);
        }
        #app-loader .loader-text {
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: #2196F3;
        }
        #app-loader .loader-bar {
            width: 180px;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
        }
        #app-loader .loader-bar span {
            position: absolute;
            inset: 0;
            width: 40%;
            background: linear-gradient(90deg, #2196F3, #58d6ff);
            border-radius: 999px;
            animation: slide 1.2s ease-in-out infinite;
        }
        @keyframes slide {
            0% { transform: translateX(-100%); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: translateX(250%); opacity: 0; }
        }
    </style>
</head>
<body>
<div id="app-loader">
    <div class="loader-text">MIXPLA</div>
    <div class="loader-bar"><span></span></div>
    <div style="font-size:0.85rem;color:#888;">Preparing infrastructure…</div>
</div>
<div id="app">Loading ...</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
